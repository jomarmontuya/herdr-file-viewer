id = "medianeth.file-viewer"
name = "File Tree"
version = "0.7.1"
min_herdr_version = "0.7.0"
description = "Clickable project file tree that opens files in Herdr workspace tabs."
platforms = ["linux", "macos"]

# Build this fork from source so its mouse and file-tab behavior cannot be
# replaced by an older upstream release binary. Requires Go 1.25+.
[[build]]
command = ["sh", "scripts/fetch-or-build.sh"]

# Make every newly-created project start as CLI + right-side file tree. The
# hook waits for Herdr's initial pane and attaches the tree without taking focus.
[[events]]
on = "workspace.created"
command = ["./bin/file-viewer", "--workspace-created"]

# Herdr persists tab/pane geometry across a full server restart, then restores
# each pane as a fresh shell. Rehydrate the focused saved layout in-place so
# file tabs and right-side trees return without changing tab IDs or geometry.
[[events]]
on = "tab.focused"
command = ["./bin/file-viewer", "--restore-focused-tab"]

# The pane that hosts the project file tree. The command path is resolved
# relative to the plugin root; `placement` is the default if the open request
# doesn't override it.
[[panes]]
id = "viewer"
title = "File Tree"
placement = "split"
command = ["./bin/file-viewer", "--tree-only"]

# File content opened as a workspace tab by explorer clicks. Tabs open in
# viewer mode first, then can switch into the in-pane editor with `e`. The
# selected path is injected through HERDR_FILE_PATH by the pane-open command.
# File panes launch in the selected file's directory so their cwd is an exact,
# non-visual ownership marker for same-basename tab reuse. Resolve the binary
# through Herdr's authoritative plugin-root environment variable so --cwd does
# not break the executable path.
[[panes]]
id = "file"
title = "File"
placement = "tab"
command = ["sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/bin/file-viewer\""]

# Read-only staged/worktree review opened from the Source Control activity.
# HERDR_DIFF_PATH, HERDR_DIFF_ROOT and HERDR_DIFF_MODE are injected by the
# explorer when the user selects a changed file.
[[panes]]
id = "diff"
title = "Diff"
placement = "tab"
command = ["sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/bin/file-viewer\""]

# User-invokable action that opens the tree pane. Herdr has no declarative
# "open this pane" field on actions, so this shells out to the Herdr CLI
# (exposed via HERDR_BIN_PATH) with the verified pane-open flags: --plugin +
# --entrypoint select the pane, and it opens as a focused split on the right.
# Open the tree pane. We deliberately do NOT pass --cwd: Herdr opens a plugin
# pane in the active workspace's directory by default, which is what we want.
[[actions]]
id = "open"
title = "Open File Tree"
contexts = ["workspace"]
command = [
  "sh", "-c",
  "\"${HERDR_BIN_PATH:-herdr}\" plugin pane open --plugin medianeth.file-viewer --entrypoint viewer --placement split --direction right --focus",
]

# Same tree, opened in its own tab instead of a side split.
[[actions]]
id = "open-tab"
title = "Open File Tree (tab)"
contexts = ["workspace"]
command = [
  "sh", "-c",
  "\"${HERDR_BIN_PATH:-herdr}\" plugin pane open --plugin medianeth.file-viewer --entrypoint viewer --placement tab --focus",
]
